<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-label="Quadro ilustrativo da aula"><rect width="1200" height="780" rx="44" fill="#E9F5FF"/><rect x="74" y="70" width="1052" height="610" rx="34" fill="#FEFBFF"/><rect x="126" y="124" width="948" height="72" rx="26" fill="#EADDFF"/><text x="600" y="171" text-anchor="middle" font-family="Arial" font-size="44" font-weight="900" fill="#21005D">Gases Perfeitos</text><text x="148" y="250" font-family="Arial" font-size="31" font-weight="900" fill="#1D1B20">Variáveis de estado físico</text><text x="168" y="304" font-family="Arial" font-size="27" fill="#49454F">• Temperatura: agitação das moléculas</text><text x="168" y="354" font-family="Arial" font-size="27" fill="#49454F">• Pressão: força nas paredes do recipiente</text><text x="168" y="404" font-family="Arial" font-size="27" fill="#49454F">• Volume: espaço ocupado pelo gás</text><text x="148" y="486" font-family="Arial" font-size="31" font-weight="900" fill="#1D1B20">Transformações gasosas</text><text x="168" y="540" font-family="Arial" font-size="27" fill="#49454F">• Isotérmica: temperatura constante</text><text x="168" y="590" font-family="Arial" font-size="27" fill="#49454F">• Isobárica: pressão constante</text><text x="168" y="640" font-family="Arial" font-size="27" fill="#49454F">• Isocórica: volume constante</text><rect x="780" y="260" width="250" height="250" rx="34" fill="#F4EFF4" stroke="#CAC4D0"/><circle cx="905" cy="385" r="72" fill="#D0BCFF"/><text x="905" y="565" text-anchor="middle" font-family="Arial" font-size="32" font-weight="900" fill="#6750A4">pV = nRT</text></svg>